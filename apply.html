<style>
  :root {
    --primary: #1A2138;
    --primary-light: #252E4F;
    --primary-dark: #0F1424;
    --accent: #8DC63F;
    --accent-dk: #74A832;
    --accent-dk2: #5C8A28;
    --accent-soft: #EEF6E0;
    --bg: #F7F9FB;
    --chat-bg: #ffffff;
    --user-bubble: #1A2138;
    --bot-bubble: #EEF1F5;
    --text: #0F1424;
    --text-light: #6b7280;
    --success: #5C8A28;
    --border: #E5E7EB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter','Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .chat-container {
    width: 100%;
    max-width: 480px;
    height: 90vh;
    max-height: 750px;
    background: var(--chat-bg);
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-header {
    background: #fff;
    color: var(--text);
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-bottom: 3px solid #8cc63f;
  }

  .chat-header .logo-img {
    display: flex;
    align-items: center;
  }

  .chat-header .logo-img img {
    max-height: 85px;
    width: auto;
  }

  .chat-header .info { text-align: center; }
  .chat-header .info p { font-size: 12px; color: var(--text-light); margin-top: 2px; font-weight: 500; }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.bot {
    background: var(--bot-bubble);
    color: var(--text);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .message.user {
    background: var(--user-bubble);
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .message.system {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    color: var(--success);
    align-self: center;
    text-align: center;
    font-weight: 600;
    border-radius: 12px;
    font-size: 13px;
  }

  .options-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .option-btn {
    padding: 10px 16px;
    border: 2px solid var(--primary-light);
    background: #fff;
    color: var(--primary);
    border-radius: 24px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .option-btn:hover {
    background: var(--primary);
    color: #fff;
    transform: translateY(-1px);
  }

  .input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    background: #fff;
  }

  .input-area input, .input-area select {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 24px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-area input:focus { border-color: var(--primary-light); }

  .input-area button {
    padding: 12px 20px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 24px;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    transition: background 0.2s;
  }

  .input-area button:hover { background: var(--primary-light); }
  .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

  .typing-indicator {
    display: flex; gap: 4px; padding: 12px 16px;
    background: var(--bot-bubble); border-radius: 16px;
    align-self: flex-start; border-bottom-left-radius: 4px;
  }

  .typing-indicator span {
    width: 8px; height: 8px; background: #9ca3af;
    border-radius: 50%; animation: bounce 1.4s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  .progress-bar {
    height: 4px; background: #e5e7eb;
  }

  .progress-bar .fill {
    height: 100%; background: var(--accent);
    transition: width 0.5s ease;
  }

  .summary-card {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-top: 8px;
    font-size: 13px;
  }

  .summary-card h4 {
    color: var(--primary);
    margin-bottom: 10px;
    font-size: 14px;
  }

  .summary-card .row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid #f1f5f9;
  }

  .summary-card .row:last-child { border-bottom: none; }
  .summary-card .label { color: var(--text-light); }
  .summary-card .value { font-weight: 600; color: var(--text); }

  .hidden { display: none !important; }
</style>
</head>

    botMessage: "Now a couple of quick questions about your financial situation to help us find the right lender.\n\nWhat's your current employment status?",

    field: 'employmentStatus',
    options: ['Full-time', 'Part-time / Casual', 'Self-employed', 'Contractor', 'Retired', 'Not currently employed'],
    next: () => 'credit_history'
  },
  {
    id: 'credit_history',
    botMessage: "How would you describe your credit history?",
    type: 'options',
    field: 'creditHistory',
    options: ['Excellent – no issues', 'Good – minor things', 'Fair – some past issues', 'Poor – defaults or judgements', 'Not sure'],
    next: () => 'existing_finance'
  },
  {
    id: 'existing_finance',
    botMessage: "Do you currently have any existing finance or loans?",
    type: 'options',
    field: 'existingFinance',
    options: ['No', 'Yes – 1 or 2', 'Yes – several', 'Prefer not to say'],
    next: () => 'lead_source'
  },

  // ===== SOURCE & BOOKING =====
  {
    id: 'lead_source',
    botMessage: "Just so we know — how did you hear about us?",
    type: 'options',
    field: 'leadSource',
    options: ['Google Search', 'Facebook / Instagram', 'Referred by someone', 'Returning client', 'Other'],
    next: (answer) => answer === 'Referred by someone' ? 'referrer' : 'preferred_day'
  },
  {
    id: 'referrer',
    botMessage: "Great to get a referral! Who referred you? (name or business)",
    type: 'text',
    field: 'referrer',
    placeholder: 'e.g. Dave from XYZ Motors',
    next: () => 'preferred_day'
  },

  // ===== APPOINTMENT BOOKING =====
  {
    id: 'preferred_day',
    botMessage: (data) => `Almost done, ${data.firstName}! Let's lock in a time for one of our brokers to give you a call.\n\nWhat day works best for you?`,
    type: 'options',
    field: 'preferredDay',
    options: ['Today', 'Tomorrow', 'This week', 'Next week', 'Specific date'],
    next: (answer) => answer === 'Specific date' ? 'specific_date' : 'preferred_time'
  },
  {
    id: 'specific_date',
    botMessage: "What date works best? (e.g. 15/04/2026)",
    type: 'text',
    field: 'preferredDate',
    placeholder: 'DD/MM/YYYY',
    next: () => 'preferred_time'
  },
  {
    id: 'preferred_time',
    botMessage: "And what time of day suits you best?",
    type: 'options',
    field: 'preferredTime',
    options: ['Morning (8am-12pm)', 'Afternoon (12pm-4pm)', 'Late afternoon (4pm-6pm)', 'Evening (after 6pm)'],
    next: () => 'notes'
  },
  {
    id: 'notes',
    botMessage: "Any other notes or questions you'd like us to know before the call? (or type 'no')",
    type: 'text',
    field: 'notes',
    placeholder: 'Anything else...',
    next: () => 'summary'
  },

  // ===== SUMMARY =====
  {
    id: 'summary',
    botMessage: 'SUMMARY',
    type: 'summary'
  }
];

// ========== STATE ==========
let currentStepIndex = 0;
let currentStep = null;
const totalSteps = flow.length;

// ========== DOM ==========
const chatMessages = document.getElementById('chatMessages');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const inputArea = document.getElementById('inputArea');
const progressFill = document.getElementById('progressFill');

textInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') handleSend();
});

// ========== HELPERS ==========
function updateProgress() {
  const pct = Math.round(((currentStepIndex) / (totalSteps - 1)) * 100);
  progressFill.style.width = pct + '%';
}

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = `message ${type}`;
  div.innerHTML = text.replace(/\n/g, '<br>');
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addOptions(options) {
  const container = document.createElement('div');
  container.className = 'options-grid';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      // Remove options
      container.remove();
      handleAnswer(opt);
    };
    container.appendChild(btn);
  });
  chatMessages.appendChild(container);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function setInputMode(mode) {
  if (mode === 'text') {
    textInput.classList.remove('hidden');
    sendBtn.classList.remove('hidden');
    textInput.focus();
  } else {
    textInput.classList.add('hidden');
    sendBtn.classList.add('hidden');
  }
}

function showSummary() {
  const assetLabel = leadData.assetType === 'Other' ? leadData.assetTypeOther : leadData.assetType;
  const dayLabel = leadData.preferredDay === 'Specific date' ? leadData.preferredDate : leadData.preferredDay;

  let rows = [
    ['Name', `${leadData.firstName} ${leadData.lastName}`],
    ['Email', leadData.email],
    ['Phone', leadData.phone],
    ['State', leadData.state],
    ['Type', leadData.enquiryType],
  ];

  if (leadData.enquiryType === 'Business') {
    rows.push(['Business', leadData.businessName]);
    if (leadData.abn && leadData.abn.toLowerCase() !== 'skip') rows.push(['ABN', leadData.abn]);
    rows.push(['Trading', leadData.businessLength]);
    rows.push(['GST Registered', leadData.gstRegistered]);
  }

  rows.push(
    ['Asset', assetLabel],
    ['Condition', leadData.newOrUsed],
    ['Purchase Price', leadData.purchasePrice],
    ['Deposit/Trade-in', leadData.hasDeposit === 'Yes' ? leadData.depositAmount : 'None'],
    ['Timeframe', leadData.timeframe],
    ['Employment', leadData.employmentStatus],
    ['Credit History', leadData.creditHistory],
    ['Existing Finance', leadData.existingFinance],
    ['Lead Source', leadData.leadSource],
    ['Callback', `${dayLabel} – ${leadData.preferredTime}`]
  );

  if (leadData.referrer) rows.push(['Referred by', leadData.referrer]);
  if (leadData.notes && leadData.notes.toLowerCase() !== 'no') rows.push(['Notes', leadData.notes]);

  const rowsHtml = rows.map(([label, value]) =>
    `<div class="row"><span class="label">${label}</span><span class="value">${value || '—'}</span></div>`
  ).join('');

  const summaryHtml = `<div class="summary-card"><h4>📋 Your Enquiry Summary</h4>${rowsHtml}</div>`;

  addMessage(
    `Thanks ${leadData.firstName}! Here's a summary of everything you've told us:` +
    summaryHtml,
    'bot'
  );

  setTimeout(() => {
    addMessage("✅ Enquiry submitted — redirecting you to confirmation…", "system");
    setInputMode('none');

    // Capture marketing attribution
    try {
      var p = new URLSearchParams(location.search);
      leadData.gclid = p.get('gclid') || localStorage.getItem('gclid') || '';
      leadData.source = p.get('source') || document.referrer || 'direct';
      leadData.landingPage = p.get('from') || 'apply.html';
    } catch(e){}

    // ===== SUBMISSION =====
    submitLead(leadData);

    // Fire Google Ads conversion event
    if (typeof gtag === 'function') {
      gtag('event', 'conversion', {'send_to': 'AW-XXXXXXXXXX/AAAAAAAA', 'value': 1.0, 'currency': 'AUD'});
    }

    // Redirect to thank-you page after a beat so user sees the success message
    setTimeout(function(){
      window.location.href = 'thank-you.html';
    }, 1400);
  }, 600);
}

// ========== FLOW ENGINE ==========
function getStepById(id) {
  return flow.find(s => s.id === id);
}

function goToStep(id) {
  const step = getStepById(id);
  if (!step) return;

  currentStep = step;
  currentStepIndex = flow.indexOf(step);
  updateProgress();

  if (step.type === 'summary') {
    showTyping();
    setTimeout(() => { hideTyping(); showSummary(); }, 1000);
    return;
  }

  const msg = typeof step.botMessage === 'function' ? step.botMessage(leadData) : step.botMessage;

  showTyping();
  setTimeout(() => {
    hideTyping();
    addMessage(msg, 'bot');

    if (step.type === 'options') {
      setInputMode('none');
      addOptions(step.options);
    } else if (step.type === 'text') {
      setInputMode('text');
      textInput.placeholder = step.placeholder || 'Type your answer...';
      textInput.value = '';
    }
  }, 600 + Math.random() * 400);
}

function handleAnswer(answer) {
  addMessage(answer, 'user');

  if (currentStep.field) {
    leadData[currentStep.field] = answer;
  }

  const nextId = currentStep.next ? currentStep.next(answer) : null;
  if (nextId) {
    setTimeout(() => goToStep(nextId), 300);
  }
}

function handleSend() {
  const value = textInput.value.trim();
  if (!value) return;

  if (currentStep && currentStep.validate) {
    const error = currentStep.validate(value);
    if (error) {
      addMessage(error, 'bot');
      return;
    }
  }

  textInput.value = '';
  setInputMode('none');
  handleAnswer(value);
}

// ========== LEAD SUBMISSION (Google Form stub) ==========
// TODO: replace GOOGLE_FORM_URL with the formResponse URL of your Google Form,
//       and map each leadData key to its entry.XXXXXXXXX ID below.
// To find entry IDs: open your Google Form, View Source, search for "entry."
// or build a pre-filled link and copy the entry IDs from the URL.
const GOOGLE_FORM_URL = 'https://docs.google.com/forms/d/e/REPLACE_FORM_ID/formResponse';
const FORM_FIELD_MAP = {
  firstName:        'entry.111111111',
  lastName:         'entry.222222222',
  email:            'entry.333333333',
  phone:            'entry.444444444',
  state:            'entry.555555555',
  enquiryType:      'entry.666666666',
  businessName:     'entry.777777777',
  abn:              'entry.888888888',
  businessLength:   'entry.999999999',
  gstRegistered:    'entry.101010101',
  assetType:        'entry.121212121',
  assetTypeOther:   'entry.131313131',
  newOrUsed:        'entry.141414141',
  assetFound:       'entry.151515151',
  purchasePrice:    'entry.161616161',
  hasDeposit:       'entry.171717171',
  depositAmount:    'entry.181818181',
  timeframe:        'entry.191919191',
  employmentStatus: 'entry.202020202',
  creditHistory:    'entry.212121212',
  existingFinance:  'entry.232323232',
  leadSource:       'entry.242424242',
  referrer:         'entry.252525252',
  preferredDay:     'entry.262626262',
  preferredDate:    'entry.272727272',
  preferredTime:    'entry.282828282',
  notes:            'entry.292929292',
  gclid:            'entry.303030303',
  source:           'entry.313131313',
  landingPage:      'entry.323232323'
};

function submitLead(data){
  // Log to console for debugging (remove in production if desired)
  console.log('=== LEAD DATA ===', data);

  // If form URL isn't configured yet, skip the network call but still flow forward
  if (GOOGLE_FORM_URL.indexOf('REPLACE_FORM_ID') !== -1) {
    console.warn('Google Form not configured. Set GOOGLE_FORM_URL + FORM_FIELD_MAP in apply.html.');
    return;
  }

  // Build form-encoded body and POST in no-cors mode (Google Forms doesn't return CORS headers)
  var body = new URLSearchParams();
  Object.keys(FORM_FIELD_MAP).forEach(function(key){
    if (data[key] != null && data[key] !== '') body.append(FORM_FIELD_MAP[key], data[key]);
  });
  fetch(GOOGLE_FORM_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: body.toString()
  }).catch(function(err){ console.error('Form submit error:', err); });
}

// ========== START ==========
// Capture marketing attribution on load (preserved through to submit)
(function(){
  try{
    var p = new URLSearchParams(location.search);
    var g = p.get('gclid');
    if (g) localStorage.setItem('gclid', g);
  }catch(e){}
})();

goToStep('welcome');
</script>
